<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avicena Skin Check</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧬 Avicena Skin Check</h1>
      <p>Analiza tu piel en segundos</p>
    </header>
    <div class="upload-section">
      <input type="file" id="photoInput" accept="image/*" style="display:none">
      <button id="cameraBtn">📸 Tomar foto</button>
      <button id="uploadBtn">📁 Subir foto</button>
    </div>
    <video id="video" style="display:none" width="640" height="480"></video>
    <canvas id="outputCanvas" width="640" height="480" style="display:none"></canvas>
    <img id="photoCanvas" style="display:none; max-width:100%; height:auto">
    <button id="analyzeBtn" style="display:none">Analizar piel</button>
    <div id="results" style="display:none">
      <h2>Resultados</h2>
      <ul id="issues"></ul>
      <ul id="recs"></ul>
      <div class="disclaimer">**Consulta con tu médico antes de cualquier procedimiento.**</div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
